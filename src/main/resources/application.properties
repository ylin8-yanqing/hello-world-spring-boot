# ============================================================
# Hello World Spring Boot – application.properties
# YSJP-220: Baseline security configuration
# ============================================================

# Server
server.port=8080

# -----------------------------------------------
# Security hardening (YSJP-220, HLSA §6)
# -----------------------------------------------

# Suppress stack traces in error responses (YSJP-221: no internal detail leakage)
server.error.include-stacktrace=never
server.error.include-exception=false
server.error.include-message=never
server.error.include-binding-errors=never

# -----------------------------------------------
# Logging (YSJP-220: avoid logging sensitive data)
# -----------------------------------------------
logging.level.root=INFO
logging.level.com.example.helloworld=INFO
# Structured logging pattern (no sensitive data)
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# -----------------------------------------------
# Actuator: disabled (YSJP-220: actuator endpoints not included)
# NOTE: spring-boot-starter-actuator is not on the classpath.
# This property is a belt-and-suspenders guard in case it is added later.
# -----------------------------------------------
management.endpoints.enabled-by-default=false
