<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Hello World - BOQ</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e8ecf1 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.10);
            padding: 48px 56px;
            text-align: center;
            max-width: 480px;
            width: 90%;
        }

        .logo-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 32px;
        }

        .logo-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 16px;
        }

        .logo-divider {
            width: 1px;
            height: 40px;
            background: #e5e7eb;
            flex-shrink: 0;
        }

        .logo {
            height: 40px;
            width: auto;
            max-width: 100%;
        }

        .divider {
            width: 60px;
            height: 4px;
            background: #e8151b;
            border-radius: 2px;
            margin: 0 auto 28px;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 12px;
        }

        .subtitle {
            font-size: 1rem;
            color: #6b7280;
            margin-bottom: 32px;
        }

        .badge {
            display: inline-block;
            background: #f0fdf4;
            color: #16a34a;
            font-size: 0.85rem;
            font-weight: 600;
            padding: 6px 16px;
            border-radius: 999px;
            border: 1px solid #bbf7d0;
            margin-bottom: 32px;
        }

        .api-link {
            display: inline-block;
            background: #1a1a2e;
            color: #ffffff;
            text-decoration: none;
            padding: 12px 28px;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 500;
            transition: background 0.2s;
        }

        .api-link:hover { background: #e8151b; }

        .footer {
            margin-top: 40px;
            font-size: 0.78rem;
            color: #9ca3af;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo-bar">
            <div class="logo-wrapper">
                <img class="logo"
                     src="https://www.boq.com.au/media_1d1e2b624aed4905ccaf41152ce6e5f94d60e6d86.svg"
                     alt="BOQ Logo"/>
            </div>
            <div class="logo-divider"></div>
            <div class="logo-wrapper">
                <img class="logo"
                     src="https://wac-cdn.atlassian.com/misc-assets/adg4-nav/AtlassianHeaderLogo.svg"
                     alt="Atlassian Logo"/>
            </div>
        </div>
        <div class="divider"></div>
        <h1 th:text="${message}">Hello World</h1>
        <p class="subtitle">Spring Boot · Java · REST API</p>
        <span class="badge">✓ Application Running</span>
        <br/>
        <a class="api-link" href="/hello">View JSON API →</a>
        <p class="footer">GET /hello-page-boq &nbsp;|&nbsp; <a href="/hello-page" style="color:#9ca3af;">CFS Page</a> &nbsp;|&nbsp; <a href="/health-page" style="color:#9ca3af;">Health Check</a></p>
    </div>
</body>
</html>
