<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Health Status</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e8ecf1 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.10);
            padding: 48px 56px;
            text-align: center;
            max-width: 480px;
            width: 90%;
        }

        .logo {
            width: 180px;
            margin-bottom: 32px;
        }

        .divider {
            width: 60px;
            height: 4px;
            background: #e8151b;
            border-radius: 2px;
            margin: 0 auto 28px;
        }

        h1 {
            font-size: 1.6rem;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 12px;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #f0fdf4;
            color: #16a34a;
            font-size: 1.1rem;
            font-weight: 700;
            padding: 10px 24px;
            border-radius: 999px;
            border: 2px solid #bbf7d0;
            margin: 20px 0 32px;
        }

        .dot {
            width: 10px;
            height: 10px;
            background: #16a34a;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .api-link {
            display: inline-block;
            background: #1a1a2e;
            color: #ffffff;
            text-decoration: none;
            padding: 12px 28px;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 500;
            transition: background 0.2s;
        }

        .api-link:hover { background: #e8151b; }

        .footer {
            margin-top: 40px;
            font-size: 0.78rem;
            color: #9ca3af;
        }
    </style>
</head>
<body>
    <div class="card">
        <img class="logo"
             src="https://www.cfs.com.au/content/dam/cfs-winged/images/CFS-logo.svg"
             alt="CFS Logo"/>
        <div class="divider"></div>
        <h1>Application Health</h1>
        <div class="status-badge">
            <div class="dot"></div>
            Status: <span th:text="${status}">UP</span>
        </div>
        <br/>
        <a class="api-link" href="/health">View JSON API →</a>
        <p class="footer">GET /health-page &nbsp;|&nbsp; <a href="/hello-page" style="color:#9ca3af;">Hello World</a></p>
    </div>
</body>
</html>
