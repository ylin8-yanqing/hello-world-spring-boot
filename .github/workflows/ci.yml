# GitHub Actions CI Workflow
# YSJP-215: Set up GitHub repository and CI pipeline with GitHub Actions
# YSJP-222: GitHub Actions runs tests on push and PR to main
# YSJP-212: Generate and publish test reports (JUnit + Confluence summary)
# YSJP-219: Post-deploy integration tests

name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Job 1: Unit Tests  (YSJP-213, YSJP-222)
  # mvn test – runs *Test.java via maven-surefire-plugin
  # ─────────────────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 22 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '22'
          distribution: 'temurin'
          cache: maven

      - name: Run unit tests
        run: mvn --batch-mode test
        working-directory: hello-world-spring-boot

      # YSJP-212: Upload JUnit XML artifacts
      - name: Upload unit test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: hello-world-spring-boot/target/surefire-reports/
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────────
  # Job 2: Integration / System Tests  (YSJP-217, YSJP-222)
  # mvn verify – runs *IT.java via maven-failsafe-plugin (full app context)
  # ─────────────────────────────────────────────────────────────────────────
  integration-tests:
    name: Integration / System Tests
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 22 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '22'
          distribution: 'temurin'
          cache: maven

      - name: Run integration tests
        run: mvn --batch-mode verify
        working-directory: hello-world-spring-boot

      # YSJP-212: Upload failsafe XML artifacts
      - name: Upload integration test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-reports
          path: hello-world-spring-boot/target/failsafe-reports/
          retention-days: 30

      # YSJP-212: Generate human-readable test summary from JUnit XML
      - name: Generate test summary
        if: always()
        run: |
          echo "## Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Unit test summary
          SUREFIRE_DIR="hello-world-spring-boot/target/surefire-reports"
          if [ -d "$SUREFIRE_DIR" ]; then
            UNIT_TESTS=$(grep -h 'tests=' $SUREFIRE_DIR/*.xml 2>/dev/null | grep -oP 'tests="\K[^"]+' | awk '{s+=$1} END {print s+0}')
            UNIT_FAIL=$(grep -h 'failures=' $SUREFIRE_DIR/*.xml 2>/dev/null | grep -oP 'failures="\K[^"]+' | awk '{s+=$1} END {print s+0}')
            UNIT_ERR=$(grep -h 'errors=' $SUREFIRE_DIR/*.xml 2>/dev/null | grep -oP 'errors="\K[^"]+' | awk '{s+=$1} END {print s+0}')
            echo "### Unit Tests" >> $GITHUB_STEP_SUMMARY
            echo "| Total | Failures | Errors |" >> $GITHUB_STEP_SUMMARY
            echo "|-------|----------|--------|" >> $GITHUB_STEP_SUMMARY
            echo "| $UNIT_TESTS | $UNIT_FAIL | $UNIT_ERR |" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY

          # Integration test summary
          FAILSAFE_DIR="hello-world-spring-boot/target/failsafe-reports"
          if [ -d "$FAILSAFE_DIR" ]; then
            IT_TESTS=$(grep -h 'tests=' $FAILSAFE_DIR/*.xml 2>/dev/null | grep -oP 'tests="\K[^"]+' | awk '{s+=$1} END {print s+0}')
            IT_FAIL=$(grep -h 'failures=' $FAILSAFE_DIR/*.xml 2>/dev/null | grep -oP 'failures="\K[^"]+' | awk '{s+=$1} END {print s+0}')
            IT_ERR=$(grep -h 'errors=' $FAILSAFE_DIR/*.xml 2>/dev/null | grep -oP 'errors="\K[^"]+' | awk '{s+=$1} END {print s+0}')
            echo "### Integration Tests" >> $GITHUB_STEP_SUMMARY
            echo "| Total | Failures | Errors |" >> $GITHUB_STEP_SUMMARY
            echo "|-------|----------|--------|" >> $GITHUB_STEP_SUMMARY
            echo "| $IT_TESTS | $IT_FAIL | $IT_ERR |" >> $GITHUB_STEP_SUMMARY
          fi

  # ─────────────────────────────────────────────────────────────────────────
  # Job 3: Security / Dependency Scan  (YSJP-214)
  # HLSA §6: SCA/dependency scanning
  # ─────────────────────────────────────────────────────────────────────────
  security-scan:
    name: Security Scan (Dependency Check)
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 22 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '22'
          distribution: 'temurin'
          cache: maven

      # YSJP-214: OWASP Dependency-Check SCA scan
      - name: Run OWASP Dependency-Check
        run: |
          mvn --batch-mode org.owasp:dependency-check-maven:check \
            -DfailBuildOnCVSS=9 \
            -DsuppressionFile=.owasp-suppressions.xml 2>/dev/null || true
        working-directory: hello-world-spring-boot
        continue-on-error: true   # Non-blocking for demo; set to false in production

      - name: Upload dependency-check report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: hello-world-spring-boot/target/dependency-check-report.html
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────────
  # Job 4: Docker Build + Post-Deploy Tests  (YSJP-219)
  # Builds the Docker image, starts container, runs post-deploy smoke test
  # ─────────────────────────────────────────────────────────────────────────
  post-deploy-tests:
    name: Docker Build & Post-Deploy Tests
    runs-on: ubuntu-latest
    needs: integration-tests

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 22 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '22'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR
        run: mvn --batch-mode package -DskipTests
        working-directory: hello-world-spring-boot

      - name: Build Docker image
        run: docker build -t hello-world-spring-boot:ci .
        working-directory: hello-world-spring-boot

      - name: Start container
        run: |
          docker run -d --name hello-app -p 8080:8080 hello-world-spring-boot:ci
          # Wait for app to be ready
          for i in {1..20}; do
            if curl -sf http://localhost:8080/hello > /dev/null 2>&1; then
              echo "App is ready."
              break
            fi
            echo "Waiting for app... ($i/20)"
            sleep 3
          done

      - name: Run post-deploy smoke tests
        run: bash scripts/post-deploy-test.sh http://localhost:8080
        working-directory: hello-world-spring-boot

      - name: Stop container
        if: always()
        run: docker stop hello-app && docker rm hello-app
